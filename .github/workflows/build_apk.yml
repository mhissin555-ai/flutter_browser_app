name: Build English For Us APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Recreate Android Folder
        run: |
          rm -rf android
          flutter create . --platforms android

      - name: Force Modern Kotlin and Gradel Fixes
        run: |
          # تعديل نظام الكوتلن الحديث جوه الـ settings.gradle الافتراضي اللي السيرفر بيكريهه
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.24"/g' android/settings.gradle
          
          # تظبيط الـ Proguard للكاش عشان ما يضربش مع المكتبات القديمة
          find ~/.pub-cache/hosted/pub.dev -name "build.gradle" -exec sed -i 's/getDefaultProguardFile(\x27proguard-android.txt\x27)/getDefaultProguardFile(\x27proguard-android-optimize.txt\x27)/g' {} +
          find ~/.pub-cache/hosted/pub.dev -name "build.gradle" -exec sed -i 's/getDefaultProguardFile("proguard-android.txt")/getDefaultProguardFile("proguard-android-optimize.txt")/g' {} +

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: English-For-Us-APK
          path: build/app/outputs/flutter-apk/app-release.apk